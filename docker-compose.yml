services:
  postgres:
    image: postgres:16
    container_name: sgrc-postgres
    environment:
      POSTGRES_DB: sgrc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sgrc_postgres_data:/var/lib/postgresql/data

  app:
    build: ./backend
    container_name: sgrc-backend
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sgrc
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  sgrc_postgres_data: